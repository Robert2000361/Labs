# Start with 2 replicas — then scale imperatively and declaratively
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scale-demo
  labels:
    app: scale-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scale-demo
  template:
    metadata:
      labels:
        app: scale-demo
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
