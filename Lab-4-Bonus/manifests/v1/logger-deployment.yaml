apiVersion: apps/v1
kind: Deployment
metadata:
  name: logger
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logger
      version: v1
  template:
    metadata:
      labels:
        app: logger
        version: v1
    spec:
      containers:
      - name: logger
        image: busybox
        command: ["/bin/sh", "-c"]
        args:
          - while true; do date >> /log/output.txt; sleep 10; done
        volumeMounts:
        - name: log-volume
          mountPath: /log
      volumes:
      - name: log-volume
        emptyDir: {}
